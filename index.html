<!doctype html>
<html lang="en">

<head>
    <title>Hard Rock Solution - Song Lyric App</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <!-- Favicon -->
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <!-- Custom css -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <nav class="navbar  navbar-dark my-3">
            <a class="navbar-brand" href="#">
                <img src="images/logo.png" alt="Hard Rock Solution">
            </a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#collapsibleNavId"
                aria-controls="collapsibleNavId" aria-expanded="false" aria-label="Toggle navigation">
                <img src="images/toggler-icon.svg" alt="">
            </button>
            <div class="collapse navbar-collapse" id="collapsibleNavId">
                <ul class="navbar-nav ml-auto mt-2 mt-lg-0">
                    <li class="nav-item active">
                        <a class="nav-link" href="#">Home <span class="sr-only">(current)</span></a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Link</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="dropdownId" data-toggle="dropdown"
                            aria-haspopup="true" aria-expanded="false">Dropdown</a>
                        <div class="dropdown-menu" aria-labelledby="dropdownId">
                            <a class="dropdown-item" href="#">Action 1</a>
                            <a class="dropdown-item" href="#">Action 2</a>
                        </div>
                    </li>
                </ul>
            </div>
        </nav>

        <main class="content-area">
            <div class="search-bar col-md-6 mx-auto">
                <h1 class="text-center">Hard Rock Lyric Search</h1>
                <div class="search-box my-5">
                    <input type="text" class="form-control" placeholder="Enter your artist song name">
                    <button class="btn btn-success search-btn">Search</button>
                </div>
            </div>
            <!-- Single Lyrics -->
            <div class="single-lyrics text-center">

            </div>
            <div class="search-result col-md-8 mx-auto py-4">
                <div class="single-result row align-items-center my-3 p-3">
                    <div class="col-md-9">
                        <h3 class="lyrics-name">Purple Noon</h3>
                        <p class="author lead">Album by <span>Washed Out</span></p>
                    </div>
                    <div class="col-md-3 text-md-right text-center">
                        <div class="col-md-3 text-md-right text-center">
    <button class="btn btn-success" onclick="getLyrics('Washed Out', 'Purple Noon')">Get Lyrics</button>
</div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <!-- Optional JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>

    <!-- Custom Script Here -->
    <script>
        const searchBtn = document.querySelector('.search-btn');
        const searchInput = document.querySelector('.form-control');
        const searchResult = document.querySelector('.search-result');
        const singleLyrics = document.querySelector('.single-lyrics');

        // 1. Search Button Event Listener
        searchBtn.addEventListener('click', function() {
            const searchTerm = searchInput.value.trim();
            if (!searchTerm) {
                alert('Please type a song or artist name!');
                return;
            }
            searchSongs(searchTerm);
        });

        // 2. Search for Songs (Suggest API)
        async function searchSongs(term) {
            try {
                const res = await fetch(`https://api.lyrics.ovh/suggest/${term}`);
                const data = await res.json();
                displayResults(data.data);
            } catch (error) {
                alert('Failed to search songs. Please try again later.');
            }
        }

        // 3. Display Song List
        function displayResults(songs) {
            searchResult.innerHTML = ''; // Clear previous results
            singleLyrics.innerHTML = ''; // Clear previous lyrics if any
            
            const top10 = songs.slice(0, 10);

            top10.forEach(song => {
                const div = document.createElement('div');
                div.classList.add('single-result', 'row', 'align-items-center', 'my-3', 'p-3');
                div.innerHTML = `
                    <div class="col-md-9">
                        <h3 class="lyrics-name">${song.title}</h3>
                        <p class="author lead">Album by <span>${song.artist.name}</span></p>
                    </div>
                    <div class="col-md-3 text-md-right text-center">
                        <button class="btn btn-success" onclick="getLyrics('${song.artist.name}', '${song.title}')">Get Lyrics</button>
                    </div>
                `;
                searchResult.appendChild(div);
            });
        }

        // 4. Fetch Actual Lyrics (The New Part!)
        async function getLyrics(artist, title) {
            try {
                const res = await fetch(`https://api.lyrics.ovh/v1/${artist}/${title}`);
                const data = await res.json();
                
                if (data.lyrics) {
                    displayLyrics(artist, title, data.lyrics);
                } else {
                    displayLyrics(artist, title, "Lyrics not found for this song.");
                }
            } catch (error) {
                console.log(error);
            }
        }

        // 5. Display Lyrics on Screen
        function displayLyrics(artist, title, lyrics) {
            singleLyrics.innerHTML = `
                <h2 class="text-success mb-4">${title} - ${artist}</h2>
                <pre class="lyric text-white">${lyrics}</pre>
            `;
            
            // Optional: Scroll to the top to see the lyrics
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

    </script>
</body>

</html>
